blueprint:
  name: Daily Modem Reset (Turn Off then On after delay)
  description: |
    Reset a modem/router every day at a chosen time.
    Turns the smart plug OFF, waits a few seconds, then turns it back ON.
    Perfect for daily modem reboot using your IKEA smart plug.
  domain: automation

  input:
    switch_entity:
      name: Smart Plug (IKEA Plug)
      description: |
        Select your IKEA smart plug that powers the modem.
        Search for "ikea" or go to Developer Tools → States to find the switch entity.
      selector:
        entity:
          domain: switch

    reset_time:
      name: Reset Time
      description: Time to reset the modem every day (e.g. 03:00)
      selector:
        time: {}

    off_duration:
      name: How long to keep OFF
      description: How many seconds the plug stays OFF before turning back ON (recommended 10-30 seconds)
      default:
        seconds: 10
      selector:
        duration:
          min: "00:00:05"
          max: "00:05:00"

trigger:
  - platform: time
    at: !input reset_time

action:
  - service: switch.turn_off
    target:
      entity_id: !input switch_entity
  - delay: !input off_duration
  - service: switch.turn_on
    target:
      entity_id: !input switch_entity

mode: single
