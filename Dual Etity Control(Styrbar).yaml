blueprint:
  name: Styrbar Dual-Entity (Click for Max/Off, Hold to Dim)
  description: 上下鍵控制燈 A，左右鍵控制燈 B。短按全開/關，長按平滑調光。
  domain: automation
  input:
    mqtt_device:
      name: Styrbar Remote Control
      selector:
        device: { integration: mqtt }
    light_a:
      name: 燈具 A (上下鍵)
      selector:
        target:
          entity:
            domain: light
    light_b:
      name: 燈具 B (左右鍵)
      selector:
        target:
          entity:
            domain: light
    brightness_step:
      name: 調光步進值
      default: 10
      selector:
        number:
          min: 1
          max: 50
          unit_of_measurement: "%"
    transition_time:
      name: 漸變時間
      default: 0.5
      selector:
        number:
          min: 0
          max: 5
          step: 0.1
          unit_of_measurement: "s"

variables:
  step_val: !input brightness_step
  trans_time: !input transition_time

mode: restart

trigger:
  # 燈具 A 觸發
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: "on"
    id: a_max
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: "off"
    id: a_off
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: brightness_move_up
    id: a_up_hold
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: brightness_move_down
    id: a_down_hold
  # 燈具 B 觸發 (左右鍵)
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: arrow_right_click
    id: b_max
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: arrow_left_click
    id: b_off
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: arrow_right_hold
    id: b_up_hold
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: arrow_left_hold
    id: b_down_hold
  # 停止信號
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: brightness_stop
    id: stop
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: arrow_right_release
    id: stop
  - platform: device
    device_id: !input mqtt_device
    domain: mqtt
    type: action
    subtype: arrow_left_release
    id: stop

action:
  - choose:
      # --- 燈具 A 邏輯 ---
      - conditions: [{condition: trigger, id: a_max}]
        sequence:
          - service: light.turn_on
            target: !input light_a
            data: { brightness_pct: 100, transition: "{{ trans_time }}" }
      
      - conditions: [{condition: trigger, id: a_off}]
        sequence:
          - service: light.turn_off
            target: !input light_a
            data: { transition: "{{ trans_time }}" }

      - conditions: [{condition: trigger, id: a_up_hold}]
        sequence:
          - repeat:
              while: [{condition: trigger, id: a_up_hold}]
              sequence:
                - service: light.turn_on
                  target: !input light_a
                  data: { brightness_step_pct: "{{ step_val }}", transition: "{{ trans_time }}" }
                - delay: { milliseconds: 400 }

      - conditions: [{condition: trigger, id: a_down_hold}]
        sequence:
          - repeat:
              while: [{condition: trigger, id: a_down_hold}]
              sequence:
                - service: light.turn_on
                  target: !input light_a
                  data: { brightness_step_pct: "{{ (step_val | int) * -1 }}", transition: "{{ trans_time }}" }
                - delay: { milliseconds: 400 }

      # --- 燈具 B 邏輯 ---
      - conditions: [{condition: trigger, id: b_max}]
        sequence:
          - service: light.turn_on
            target: !input light_b
            data: { brightness_pct: 100, transition: "{{ trans_time }}" }

      - conditions: [{condition: trigger, id: b_off}]
        sequence:
          - service: light.turn_off
            target: !input light_b
            data: { transition: "{{ trans_time }}" }

      - conditions: [{condition: trigger, id: b_up_hold}]
        sequence:
          - repeat:
              while: [{condition: trigger, id: b_up_hold}]
              sequence:
                - service: light.turn_on
                  target: !input light_b
                  data: { brightness_step_pct: "{{ step_val }}", transition: "{{ trans_time }}" }
                - delay: { milliseconds: 400 }

      - conditions: [{condition: trigger, id: b_down_hold}]
        sequence:
          - repeat:
              while: [{condition: trigger, id: b_down_hold}]
              sequence:
                - service: light.turn_on
                  target: !input light_b
                  data: { brightness_step_pct: "{{ (step_val | int) * -1 }}", transition: "{{ trans_time }}" }
                - delay: { milliseconds: 400 }

      # --- 停止 ---
      - conditions: [{condition: trigger, id: stop}]
        sequence:
          - stop: "Released"
