blueprint:
  name: IKEA TRÅDFRI Open/Close Remote → Toggle Smart Plug / Fan
  description: |
    用 IKEA 方形窗簾遙控器控制 Smart Plug 開關風扇
    上鍵 / 下鍵 短按 皆可 Toggle（可自行選擇）
  domain: automation

  input:
    remote:
      name: IKEA 窗簾遙控器
      description: 選擇你的 TRÅDFRI Open/Close Remote
      selector:
        device:
          integration: mqtt
          manufacturer: IKEA

    smart_plug:
      name: Smart Plug（風扇插座）
      description: 選擇控制風扇的 Smart Plug（switch 實體）
      selector:
        entity:
          domain: switch

    button_action:
      name: 使用哪個按鈕來 Toggle 風扇
      description: 推薦用「上鍵短按」或「下鍵短按」
      selector:
        select:
          options:
            - label: "上鍵短按 (Up Short)"
              value: "up_short"
            - label: "下鍵短按 (Down Short)"
              value: "down_short"
            - label: "上鍵長按 (Up Long)"
              value: "up_long"
            - label: "下鍵長按 (Down Long)"
              value: "down_long"
          multiple: false

trigger:
  - platform: device
    device_id: !input remote
    domain: zha
    type: button
    subtype: !input button_action

action:
  - service: switch.toggle
    target:
      entity_id: !input smart_plug

mode: single
