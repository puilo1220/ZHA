blueprint:
  name: "IKEA E1766 - Dual Blind Control (Zigbee2MQTT)"
  description: "Control two blinds using the IKEA E1766 remote via Zigbee2MQTT."
  domain: automation
  input:
    remote:
      name: Remote
      description: Select your E1766 remote device.
      selector:
        device:
          integration: mqtt
          manufacturer: IKEA
    blind_left:
      name: Left Blind
      selector:
        entity:
          domain: cover
    blind_right:
      name: Right Blind
      selector:
        entity:
          domain: cover

mode: restart
max_exceeded: silent

trigger:
  - platform: device
    domain: mqtt
    device_id: !input remote
    type: action
    subtype: "open"
    id: "up"
  - platform: device
    domain: mqtt
    device_id: !input remote
    type: action
    subtype: "close"
    id: "down"

action:
  - choose:
      - conditions:
          - condition: trigger
            id: "up"
        sequence:
          - service: cover.open_cover
            target:
              entity_id:
                - !input blind_left
                - !input blind_right
      - conditions:
          - condition: trigger
            id: "down"
        sequence:
          - service: cover.close_cover
            target:
              entity_id:
                - !input blind_left
                - !input blind_right
